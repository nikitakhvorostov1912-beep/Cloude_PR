# Interview-to-BPMN Configuration
# ================================
# 100% локальный режим (без платных API)

# Transcription settings
transcription:
  # Mode: "local_cpu" (faster-whisper CPU), "local" (WhisperX GPU), "api" (OpenAI)
  mode: "local_cpu"

  # Local CPU mode (faster-whisper, без GPU)
  local_cpu:
    # Модель: "tiny", "base", "small", "medium", "large-v3"
    # medium — оптимальный баланс качества и скорости на CPU
    model: "medium"
    language: "ru"
    # Compute type для CPU: "int8" (быстрее) или "float32" (точнее)
    compute_type: "int8"
    # Beam size (меньше = быстрее, больше = точнее)
    beam_size: 5

  # Local GPU mode (WhisperX)
  local:
    server_url: "http://localhost:8000"
    model: "large-v3"
    language: "ru"
    device: "cuda"
    batch_size: 16
    compute_type: "float16"

  # API mode (OpenAI Whisper API) — платный
  api:
    api_key: ""
    model: "whisper-1"
    language: "ru"

# Speaker diarization settings
diarization:
  min_speakers: 0
  max_speakers: 0
  hf_token: ""

# AI analysis settings
analysis:
  # Provider: "ollama" (локальный, бесплатный) или "anthropic" (платный)
  provider: "ollama"

  # Ollama settings (локальный LLM)
  ollama:
    url: "http://localhost:11434"
    # Модели: "gemma2" (~5GB), "mistral" (~4GB), "llama3.1:8b" (~4.7GB)
    model: "llama3.1:8b"
    # Таймаут запроса в секундах (LLM может долго думать на CPU)
    timeout: 600

  # Anthropic settings (платный, оставлено как fallback)
  anthropic:
    model: "claude-sonnet-4-20250514"
    api_key: ""

  # Общие параметры
  temperature: 0.1
  max_tokens: 8192

# BPMN generation settings
bpmn:
  output_format: "png"
  scale: 2
  generate_both_levels: true

# Document generation settings
docs:
  gost_compliance: true
  templates_dir: "src/docs/templates"
  output_format: "docx"
  language: "ru"

# Project settings
project:
  data_dir: "data/projects"
  auto_save: true

# Audio preprocessing settings
audio:
  sample_rate: 16000
  channels: 1
  supported_formats:
    - mp3
    - wav
    - m4a
    - ogg
    - flac
    - wma
    - aac
