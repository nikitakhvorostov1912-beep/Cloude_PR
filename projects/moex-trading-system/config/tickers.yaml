# Карта секторов
sectors:
  oil_gas:
    tickers: [GAZP, LKOH, NVTK, ROSN, SNGS, TATN, TRNFP]
    name: "Нефть и газ"
    macro_driver: brent
  banks:
    tickers: [SBER, VTBR, TCSG, MOEX]
    name: "Финансы и банки"
    macro_driver: key_rate
  it:
    tickers: [YDEX, OZON]
    name: "Информационные технологии"
    macro_driver: domestic
  metals:
    tickers: [GMKN, ALRS, PLZL, NLMK, CHMF, MAGN, RUAL]
    name: "Металлы и добыча"
    macro_driver: usd_rub
  retail:
    tickers: [MGNT]
    name: "Потребительский сектор"
    macro_driver: domestic
  telecom:
    tickers: [MTSS]
    name: "Телекоммуникации"
    macro_driver: domestic
  chemicals:
    tickers: [PHOR]
    name: "Химия и удобрения"
    macro_driver: usd_rub
  real_estate:
    tickers: [PIKK]
    name: "Недвижимость"
    macro_driver: key_rate
  transport:
    tickers: [AFLT, FLOT]
    name: "Транспорт"
    macro_driver: domestic
  energy:
    tickers: [IRAO]
    name: "Электроэнергетика"
    macro_driver: domestic

# Фьючерсы FORTS
futures:
  - ticker: SiH6
    underlying: USDRUB
    type: futures
    lot_size: 1
    tick_size: 1
    margin_pct: 0.12
    contract_size: 1000
  - ticker: BRJ6
    underlying: BRENT
    type: futures
    lot_size: 1
    tick_size: 0.01
    margin_pct: 0.15
    contract_size: 10
  - ticker: SRH6
    underlying: SBER
    type: futures
    lot_size: 1
    tick_size: 1
    margin_pct: 0.20
    contract_size: 100

# Dynamic Selection параметры
selection:
  max_positions: 7           # макс. одновременных позиций
  min_composite_score: 60    # порог для входа
  rebalance_frequency: daily # как часто пересчитывать
  weights:
    ml_score: 0.40
    momentum: 0.25
    macro_alignment: 0.20
    relative_strength: 0.15
  regime_overrides:
    uptrend:
      max_positions: 7
      min_score: 55
    range:
      max_positions: 4
      min_score: 60
    downtrend:
      max_positions: 2
      min_score: 70
    crisis:
      max_positions: 0
